<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Request a Quote | A Stitch Above Embroidery</title>
    <meta name="description" content="Request a custom embroidery quote from A Stitch Above. Upload your logo and details for business branding, spirit wear, or personalized gifts.">
    <meta property="og:title" content="Request a Quote | A Stitch Above Embroidery">
    <meta property="og:description" content="Ready to start your project? Fill out our request form to get a personalized embroidery estimate for your business or group.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stitchaboveembroidery.com/support.html"> 
    <meta property="og:image" content="https://stitchaboveembroidery.com/assets/images/og-share.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/styles/style.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="support-page">
        <div class="form-header">
            <h1>Request a Quote</h1>
            <p>Tell us about your project. Lois will review your details and get back to you with a personalized estimate.</p>
        </div>

        <form action="https://formspree.io/f/your_id" method="POST" enctype="multipart/form-data" class="quote-form">
            
            <div class="form-section">
                <h3>Contact Information</h3>
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" placeholder="(555) 555-5555">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Project Details</h3
                <div class="form-group">
                    <label for="items">Items from Supplier (Names or SKUs)</label>
                    <textarea id="items" name="supplier_items" rows="2" placeholder="e.g., 12x Port Authority Polos (L123) in Navy"></textarea>
                    <small>Refer to our <a href="contact.html">Supplier Links</a> for apparel options.</small>
                </div>
                <div class="form-group">
                    <label for="description">Embroidery Details *</label>
                    <textarea id="description" name="project_description" rows="4" required placeholder="Size, placement, and any specific text..."></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3>Artwork</h3>
                <div class="form-group">
                    <label for="file-upload" class="file-label">Upload Logo or Inspiration</label>
                    <input type="file" id="file-upload" name="upload" accept="image/*,.pdf,.ai,.eps">
                    <small>Accepted formats: JPG, PNG, PDF, AI, EPS</small>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Quote Request</button>
        </form>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
</body>
</html>
